<!DOCTYPE html>
<html>
<head>
<script>
  const hash = window.location.hash;
  const search = window.location.search;
  if(hash || search){
    window.location.replace('/zibeereads/' + (search||'') + (hash||''));
  } else {
    window.location.replace('/zibeereads/');
  }
</script>
</head>
<body></body>
</html>
